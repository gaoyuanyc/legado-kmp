name: Build libshared.so for HarmonyOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-so:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build Android target
        run: |
          ./gradlew :shared:compileDebugKotlinAndroid --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: shared-build
          path: shared/build/
          retention-days: 7

  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Run JVM tests
        run: ./gradlew :shared:jvmTest --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: shared/build/reports/tests/
