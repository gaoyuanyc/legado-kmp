name: Build libshared.so for HarmonyOS

on:
  push:
    branches: [main]
    paths:
      - 'shared/**'
  pull_request:
    paths:
      - 'shared/**'
  workflow_dispatch:

jobs:
  build-harmony-so:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      # 1. Try standard Kotlin/Native harmonyOSArm64 target first
      - name: Attempt harmonyOSArm64 build
        continue-on-error: true
        id: attempt_build
        run: |
          echo "=== Attempting standard harmonyOSArm64 build ==="
          ./gradlew :shared:linkHarmonyOSArm64 --no-daemon --stacktrace 2>&1 | tee build.log
          if grep -q "BUILD SUCCESSFUL" build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      # 2. If standard fails, try with KuiklyBase toolchain
      - name: Setup OHOS toolchain (fallback)
        if: steps.attempt_build.outputs.status == 'failure'
        run: |
          set -euo pipefail
          mkdir -p ~/.konan
          echo "Downloading OHOS LLVM toolchain..."
          curl -sSL -o /tmp/llvm-ohos.tar.gz \
            "https://github.com/linhandev/KuiklyBase-kotlin/releases/download/llvm-ohos-2/LLVM-19.1.7-ohos-2.tar.gz" \
            || echo "WARN: Could not download LLVM"
          if [ -f /tmp/llvm-ohos.tar.gz ]; then
            tar -xf /tmp/llvm-ohos.tar.gz -C ~/.konan/ 2>/dev/null || true
            echo "LLVM toolchain extracted"
          fi
          curl -sSL -o /tmp/sysroot-ohos.tar.gz \
            "https://kotlinnativeohos.online/download/sysroot-ohos-aarch64-5.0.11.110.tar.gz" \
            || echo "WARN: Could not download sysroot"
          if [ -f /tmp/sysroot-ohos.tar.gz ]; then
            tar -xf /tmp/sysroot-ohos.tar.gz -C ~/.konan/ 2>/dev/null || true
            echo "Sysroot extracted"
          fi
          ls -la ~/.konan/ 2>/dev/null || true

      # 3. Retry build with toolchain
      - name: Retry build with OHOS toolchain
        if: steps.attempt_build.outputs.status == 'failure'
        continue-on-error: true
        run: |
          echo "=== Retrying build with OHOS toolchain ==="
          ./gradlew :shared:linkHarmonyOSArm64 --no-daemon --stacktrace 2>&1 | tee build2.log

      # 4. Report status
      - name: Report build status
        run: |
          echo "=== Build Status Report ==="
          if grep -q "BUILD SUCCESSFUL" build.log 2>/dev/null; then
            echo "Standard build succeeded"
          elif grep -q "BUILD SUCCESSFUL" build2.log 2>/dev/null; then
            echo "Build with OHOS toolchain succeeded"
          else
            echo "Builds failed - target requires custom toolchain"
            echo "Standard Kotlin/Native 2.3.21 does not include harmonyOSArm64 target."
            echo "Options:"
            echo "  1. Use Kotlin-OHOS fork with custom target"
            echo "  2. Use KuiklyBase toolchain extension"
            echo "  3. Build on local macOS with DevEco Studio + KBA toolchain"
          fi

      # 5. Check for outputs
      - name: Check build outputs
        run: |
          echo "=== Searching for .so files ==="
          find shared/build -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "No .so files found"

      - name: Upload artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: harmony-build-attempt
          path: |
            shared/build/**/*.so
            shared/build/**/*.h
            build*.log
          retention-days: 7
          if-no-files-found: ignore

  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Run JVM tests
        run: ./gradlew :shared:jvmTest --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: shared/build/reports/tests/