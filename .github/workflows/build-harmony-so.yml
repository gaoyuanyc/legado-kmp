name: Build libshared.so (Kotlin-OHOS)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['shared/**']

jobs:
  build-harmony-so:
    runs-on: macos-26  # Apple Silicon ARM64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # 1. Set up JDK 8 (aarch64) for Kotlin cinterop
      - name: Set up JDK 8 (aarch64)
        uses: actions/setup-java@v5
        id: jdk8
        with:
          distribution: 'zulu'
          java-version: '8'
          architecture: aarch64

      # 2. Set up JDK 21 for Gradle
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        id: jdk21
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Download Kotlin-OHOS prebuilt toolchain
      - name: Download Kotlin-OHOS toolchain
        run: |
          set -euo pipefail
          mkdir -p ~/.konan

          # Download prebuilt Kotlin/Native for OHOS
          # From zxystd/Kotlin-OHOS releases
          TOOLCHAIN_URL="https://github.com/zxystd/Kotlin-OHOS/releases/download/v2.1.255-SNAPSHOT/kotlin-native-prebuilt-macos-aarch64-2.1.255-SNAPSHOT.tar.gz"

          echo "Downloading Kotlin-OHOS toolchain..."
          curl -sSL -o /tmp/kn-ohos.tar.gz "$TOOLCHAIN_URL" || {
            echo "WARN: Could not download from primary URL, trying alternative..."
            curl -sSL -o /tmp/kn-ohos.tar.gz \
              "https://github.com/zxystd/Kotlin-OHOS/releases/latest/download/kotlin-native-prebuilt-macos-aarch64-2.1.255-SNAPSHOT.tar.gz" \
              || echo "WARN: Download failed"
          }

          if [ -f /tmp/kn-ohos.tar.gz ]; then
            echo "Extracting toolchain..."
            tar -xf /tmp/kn-ohos.tar.gz -C ~/.konan/
            echo "Toolchain extracted to ~/.konan/"
            ls -la ~/.konan/
          else
            echo "ERROR: Could not download Kotlin-OHOS toolchain"
            exit 1
          fi

      # 4. Download KuiklyBase LLVM toolchain
      - name: Download LLVM toolchain
        run: |
          set -euo pipefail

          # LLVM toolchain for OHOS compilation
          LLVM_URL="https://github.com/linhandev/KuiklyBase-kotlin/releases/download/llvm-ohos-2/LLVM-19.1.7-ohos-2.tar.gz"

          echo "Downloading LLVM toolchain..."
          curl -sSL -o /tmp/llvm.tar.gz "$LLVM_URL" || echo "WARN: LLVM download failed"

          if [ -f /tmp/llvm.tar.gz ]; then
            tar -xf /tmp/llvm.tar.gz -C ~/.konan/ 2>/dev/null || true
            echo "LLVM extracted"
          fi

          # Download OHOS sysroot
          SYSROOT_URL="https://kotlinnativeohos.online/download/sysroot-ohos-aarch64-5.0.11.110.tar.gz"
          echo "Downloading OHOS sysroot..."
          curl -sSL -o /tmp/sysroot.tar.gz "$SYSROOT_URL" || echo "WARN: Sysroot download failed"

          if [ -f /tmp/sysroot.tar.gz ]; then
            tar -xf /tmp/sysroot.tar.gz -C ~/.konan/ 2>/dev/null || true
            echo "Sysroot extracted"
          fi

          ls -la ~/.konan/

      # 5. Configure Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      # 6. Build libshared.so
      - name: Build libshared.so
        run: |
          export JAVA_HOME=${{ steps.jdk21.outputs.path }}
          export JDK_18=${{ steps.jdk8.outputs.path }}
          export KONAN_DATA_DIR=$HOME/.konan

          echo "=== Building libshared.so ==="
          ./gradlew :shared:linkHarmonyOSArm64 \
            --no-daemon \
            --stacktrace \
            -Pkn-native-preinstalled=$HOME/.konan

      # 7. Verify outputs
      - name: Verify outputs
        run: |
          echo "=== Searching for .so files ==="
          find shared/build -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "No .so files"
          find shared/build -name "*.h" -exec ls -lh {} \; 2>/dev/null || echo "No .h files"

      # 8. Upload artifacts
      - name: Upload libshared.so
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: libshared-harmonyos
          path: |
            shared/build/bin/**/*.so
            shared/build/bin/**/*.h
          retention-days: 30
          if-no-files-found: ignore

  # Always run JVM tests
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Run JVM tests
        run: ./gradlew :shared:jvmTest --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: shared/build/reports/tests/